name: "IndexNow Auto"

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  indexnow:
    runs-on: ubuntu-latest
    steps:
      - name: "Fetch All URLs from Sitemap and Submit"
        run: |
          # 1. Lấy toàn bộ link từ sitemap mới (đảm bảo file sitemap.xml đã được push lên)
          URL_LIST=$(curl -s https://sportingnewsuit.id.vn/sitemap.xml | grep -oP '(?<=<loc>).*?(?=</loc>)' | jq -R . | jq -s .)
          
          # 2. Debug: Kiểm tra xem có lấy được URL nào không
          if [ "$URL_LIST" == "[]" ] || [ -z "$URL_LIST" ]; then
            echo "Lỗi: Không lấy được danh sách URL từ sitemap!"
            exit 1
          fi
          echo "Danh sách URL sẽ gửi: $URL_LIST"

          # 3. Gửi lệnh POST đến Bing với thông tin domain mới
          curl -s -i -X POST "https://www.bing.com/indexnow" \
          -H "Content-Type: application/json; charset=utf-8" \
          -d "{
            \"host\": \"sportingnewsuit.id.vn\",
            \"key\": \"${{ secrets.INDEXNOW_KEY }}\",
            \"keyLocation\": \"https://sportingnewsuit.id.vn/${{ secrets.INDEXNOW_KEY }}.txt\",
            \"urlList\": $URL_LIST
          }"